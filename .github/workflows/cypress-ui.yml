name: UI Tests

on:
  workflow_dispatch:
  push:
    branches: [master]
  pull_request: 
    branches: [master]

env:
  CI: true

jobs:
  ui-tests:
    runs-on: ubuntu-latest

    env:
      EMAIL: ${{ secrets.EMAIL }}
      PASSWORD: ${{ secrets.PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18.18.2
          cache: npm

      - run: npm ci

      - name: Run UI Tests
        run: npm run cy:ui

      - name: Generate UI Report
        run: npm run report:ui

      - name: Upload UI Report
        uses: actions/upload-artifact@v4
        with:
          name: ui-report
          path: cypress/reports/ui/final